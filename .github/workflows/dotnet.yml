name: .NET

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    env:
      PUBLISH_DIR: publish

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish (Windows)
      if: matrix.os == 'windows-latest'
      run: dotnet publish TIPatcher -c Release -r win-x64 -p:DebugType=None -p:DebugSymbols=false -o $env:PUBLISH_DIR

    - name: Publish (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: dotnet publish TIPatcher -c Release -r linux-x64 -p:DebugType=None -p:DebugSymbols=false -o $PUBLISH_DIR

    - name: Zip (Windows)
      if: matrix.os == 'windows-latest'
      run: Compress-Archive -Path $env:PUBLISH_DIR\* -DestinationPath patcher-win.zip

    - name: Zip (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: zip -r patcher-linux.zip $PUBLISH_DIR

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: build-${{ matrix.os }}
        path: patcher-*.zip
  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      run: |
        gh release create ${{ github.ref_name }} artifacts/**/*.zip \
          --title "${{ github.ref_name }}" \
          --generate-notes
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}