# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
      

jobs:
  build:           
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Publish
      run: dotnet publish TIPatcher -c Release -p:PublishProfile=win-x64
    - name: Zip build output
      run: powershell Compress-Archive -Path publish\* -DestinationPath app.zip
    - name: Upload app
      run: |
        gh release create ${{ github.ref_name }} app.zip --title "Release ${{ github.ref_name }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
